<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang — Takoyaki House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style/style.css">
    <link rel="stylesheet" href="../../style/member/member-layout.css">
    <link rel="stylesheet" href="../../style/member/home.css">
    <script src="../../js/auth.js"></script>
    <script src="../../js/data/accountData.js"></script>
    <script src="../../js/data/menuData.js"></script>
    <script src="../../js/data/orderData.js"></script>
    <script src="../../js/data/articleData.js"></script>
    <script src="../../js/member/member-components.js"></script>
    <script src="../../js/member/member-layout.js"></script>
    <script src="../../js/member/keranjang.js" defer></script>
</head>
<body>
<div class="member-page-body">

    <div class="member-content">
        <div class="keranjang-wrap-member">

            <!-- Cart items -->
            <div class="m-card keranjang-list-card">
                <div class="m-card-header">
                    <h3>Item Pesanan</h3>
                    <a href="../menu.html" class="m-card-action">+ Tambah Produk</a>
                </div>
                <div id="cartList"></div>
            </div>

            <!-- Summary -->
            <aside class="keranjang-summary-card" id="cartSummaryCard">
                <h3 class="ks-title">Ringkasan Pesanan</h3>
                <div id="ksLines" class="ks-lines"></div>
                <div class="ks-divider"></div>
                <div class="ks-grand">
                    <span>Total</span>
                    <strong id="ksTotal">Rp 0</strong>
                </div>
                <a href="../pembayaran.html" class="btn-primary ks-checkout-btn" id="ksCheckoutBtn">
                    Lanjut Pembayaran →
                </a>
                <a href="../menu.html" class="ks-back-link">← Tambah Produk Lagi</a>
            </aside>

        </div>
    </div>

    <footer class="member-footer" style="margin-top: 200px;">
        <p>© 2026 Takoyaki House · Member Area</p>
    </footer>
</div>
</body>
</html>
