<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Takoyaki House</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../style/style.css">
    <link rel="stylesheet" href="../../style/admin/dashboard.css">

    <script src="../../js/data/accountData.js"></script>
    <script src="../../js/data/menuData.js"></script>
    <script src="../../js/data/orderData.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/admin/dashboard.js"></script>
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-top">
            <div class="sidebar-logo">
                <img src="https://i.pinimg.com/736x/37/c3/cb/37c3cb99aa3054e970036fa4bb50ad95.jpg">
                <div>
                    <h2>Takoyaki</h2>
                    <p>Admin Panel</p>
                </div>
            </div>
        </div>

        <div class="sidebar-menu">
            <a href="dashboard.html" class="active">
                📊 Dashboard
            </a>

            <a href="kelola-produk.html">
                🍡 Kelola Produk
            </a>

            <a href="kelola-transaksi.html">
                🧾 Kelola Transaksi
            </a>

            <a href="kelola-user.html">
                👥 Kelola Pengguna
            </a>

            <a href="kelola-artikel.html">
                📰 Kelola Artikel
            </a>
        </div>

        <div class="sidebar-bottom">
            <button class="logout-btn">
                Logout
            </button>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="dashboard-main">

        <header class="topbar">
            <div>
                <p class="topbar-tag">Welcome Back 👋</p>
                <h1>Dashboard Overview</h1>
            </div>

            <div class="topbar-right">
                <input type="text" placeholder="Search data...">

                <div class="admin-profile">
                    <img src="https://i.pinimg.com/736x/37/c3/cb/37c3cb99aa3054e970036fa4bb50ad95.jpg">

                    <div>
                        <h4>Administrator</h4>
                        <p>Admin</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- STATISTICS -->

        <section class="stats-grid">

            <div class="stats-card">
                <div class="stats-top">
                    <span>🛒</span>
                    <p id="ordersTrend">+12%</p>
                </div>

                <h2 id="totalOrdersStat">0</h2>
                <span>Total Orders</span>
            </div>

            <div class="stats-card">
                <div class="stats-top">
                    <span>💰</span>
                    <p id="revenueTrend">+8%</p>
                </div>

                <h2 id="totalRevenueStat">Rp 0</h2>
                <span>Revenue</span>
            </div>

            <div class="stats-card">
                <div class="stats-top">
                    <span>👥</span>
                    <p id="membersTrend">+20%</p>
                </div>

                <h2 id="totalMembersStat">0</h2>
                <span>Members</span>
            </div>

            <div class="stats-card">
                <div class="stats-top">
                    <span>🔥</span>
                    <p>Best Seller</p>
                </div>

                <h2 id="bestSellerStat">-</h2>
                <span>Most Favorite Menu</span>
            </div>

        </section>

        <section class="dashboard-grid">

            <div class="dashboard-card recent-orders">

                <div class="card-header">
                    <h3>Recent Orders</h3>

                    <a href="kelola-transaksi.html">
                        <button>View All</button>
                    </a>
                </div>

                <div class="order-list" id="recentOrdersList"></div>

            </div>

            <div class="dashboard-card popular-menu">

                <div class="card-header">
                    <h3>Popular Menu</h3>
                </div>

                <div id="popularMenuList"></div>

            </div>

        </section>

    </main>

</body>
</html>
